<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--=============== REMIXICONS ===============-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" />

    <!--=============== FONT AWESOME ICONS ===============-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!--=============== GOOGLE FONTS ===============-->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_forward" />

    <!--=============== SWIPER ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/styles.css" />

    <link rel="shortcut icon" href="assets/img/web-icon.png" type="x-icon" />
    <title>Evelina Graumane - Portfolio</title>
</head>

<body>
    <div class="cursor"></div>

    <!--==================== HEADER ====================-->
    <header class="header" id="header">
        <nav class="nav container">
            <a href="/" class="nav-logo">
                <img src="assets/img/Logo.svg" alt="Logo" />
            </a>

            <div class="nav-menu" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="/" class="nav-link">Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a href="about.html" class="nav-link">About</a>
                    </li>
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact</a>
                    </li>
                </ul>

                <div class="nav-close" id="nav-close">
                    <i class="ri-close-line"></i>
                </div>
            </div>

            <div class="nav-actions">
                <div class="nav-toggle" id="nav-toggle">
                    <i class="ri-menu-line"></i>
                </div>
            </div>
        </nav>
    </header>

    <!--========== MAIN ==========-->
    <main class="main" id="top">

        <!--========== HERO / INTRO ==========-->
        <section class="work-details section">
            <div class="intro container">

                <a href="#" class="title-link" id="title-link">
                    <div class="title-container">
                        <h2 class="work-title">Project title</h2>
                        <button class="title-button material-symbols-rounded" id="title-button" aria-label="Open">
                            arrow_forward
                        </button>
                    </div>
                </a>

                <!-- Meta -->
                <div class="work-meta">
                    <div class="meta-item">
                        <span class="meta-label">Timeline</span>
                        <span class="meta-value"></span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">My role</span>
                        <span class="meta-value"></span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">Team</span>
                        <span class="meta-value"></span>
                    </div>
                </div>

                <!-- Tags -->
                <div class="work__tags"></div>
            </div>
        </section>

        <!--========== DYNAMIC SECTIONS ROOT ==========-->
        <div id="dynamic-sections"></div>

        <!--========== NEXT PROJECT ==========-->
        <section class="next-work section">
            <div class="container">
                <h2 class="next-subtitle"></h2>
                <a class="next-button"></a>
            </div>
        </section>

    </main>

    <!--==================== FOOTER ====================-->
    <footer class="footer">
        <div class="footer-container container">

            <div class="reach-out">
                <span class="reach-label">Don't be shy and reach out</span>
                <a href="contact.html" class="pop-button ri-pencil-fill"></a>
            </div>

            <div class="footer-social">
                <a href="https://www.instagram.com/eee.ggr/" class="footer-social-link">
                    <i class="ri-instagram-fill"></i>
                </a>
                <a href="https://www.facebook.com/evelina.graumane/" class="footer-social-link">
                    <i class="ri-facebook-fill"></i>
                </a>
                <a href="https://www.linkedin.com/in/evel%C4%ABna-graumane-b60aa5246/" class="footer-social-link">
                    <i class="ri-linkedin-fill"></i>
                </a>
            </div>
        </div>

        <span class="footer-copy">
            &#169; All Rights Reserved By Evelina Graumane
        </span>
    </footer>

    <!--========== SCROLL UP ==========-->
    <a href="#top" class="scrollup" id="scroll-up" aria-label="Scroll to top">
        <i class="ri-arrow-up-line"></i>
    </a>

    <!--=============== TEMPLATES ===============-->

    <!-- ===== ABOUT 1 ===== -->
    <template id="tpl-about1">
        <section class="about-work1 section">
            <div class="container">
                <h2 class="section-title"></h2>

                <div class="about-content1">
                    <div class="about-left1"></div>

                    <div class="about-right1">
                        <img src="" alt="" class="about-image1">
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-about1-block">
        <div class="about-block1">
            <span class="about-label1"></span>
            <p class="about-description1"></p>
        </div>
    </template>

    <!-- ===== ABOUT 2 ===== -->
    <template id="tpl-about2">
        <section class="about-work2 section">
            <div class="container">
                <h2 class="section-title"></h2>

                <div class="about-work2__intro">
                    <span class="about-work2__label"></span>
                    <p class="about-work2__description"></p>
                </div>

                <div class="about-work2__main-image">
                    <img src="" alt="">
                </div>

                <div class="about-work2__gallery"></div>
            </div>
        </section>
    </template>

    <!-- ===== ABOUT 3 (BIG PROJECTS) ===== -->
    <template id="tpl-about3">
        <section class="big-projects section">
            <div class="container">
                <h2 class="section-title"></h2>
                <div class="big-projects-grid"></div>
            </div>
        </section>
    </template>

    <template id="tpl-about3-card">
        <article class="big-projects-card">
            <i class="big-projects-card__icon"></i>
            <h3 class="big-projects-card__title"></h3>
            <p class="big-projects-card__text"></p>
        </article>
    </template>

    <!--=============== SCRIPTS ===============-->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/project-page.js"></script>

</body>

</html>
